services:
  - type: web
    name: ai-startup-validator-backend
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SERPAPI_KEY
        sync: false
      - key: PORT
        value: "10000"

  - type: static
    name: ai-startup-validator-frontend
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - path: /
        destination: /index.html
      - path: /*
        destination: /index.html
